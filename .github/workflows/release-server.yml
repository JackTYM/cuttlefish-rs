name: Release Server

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'crates/cuttlefish-core/**'
      - 'crates/cuttlefish-db/**'
      - 'crates/cuttlefish-providers/**'
      - 'crates/cuttlefish-sandbox/**'
      - 'crates/cuttlefish-vcs/**'
      - 'crates/cuttlefish-agents/**'
      - 'crates/cuttlefish-api/**'
      - 'crates/cuttlefish-discord/**'
      - 'crates/cuttlefish-tunnel/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/release-server.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Find highest server version tag
          latest_tag=$(git tag -l "server-v*" | sort -V | tail -1)

          if [ -z "$latest_tag" ]; then
            # No server tags yet, start at 0.1.0
            new_version="0.1.0"
          else
            # Extract version and increment patch
            current=$(echo "$latest_tag" | sed 's/server-v//')
            major=$(echo $current | cut -d. -f1)
            minor=$(echo $current | cut -d. -f2)
            patch=$(echo $current | cut -d. -f3)
            new_patch=$((patch + 1))
            new_version="${major}.${minor}.${new_patch}"
          fi

          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "Next server version: $new_version"

  build-webui:
    name: Build WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cuttlefish-web/package-lock.json

      - name: Install dependencies
        working-directory: cuttlefish-web
        run: npm install

      - name: Build WebUI
        working-directory: cuttlefish-web
        run: npm run generate

      - name: Package WebUI
        run: |
          cd cuttlefish-web/.output/public
          tar czvf ../../../cuttlefish-webui.tar.gz .

      - name: Upload WebUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuttlefish-webui
          path: cuttlefish-webui.tar.gz
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: [determine-version, build-webui]
    if: needs.determine-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Download WebUI artifact
        uses: actions/download-artifact@v4
        with:
          name: cuttlefish-webui
          path: .

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install OpenSSL (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "server-${{ matrix.target }}"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Extract WebUI for embedding
        run: |
          mkdir -p webui-embed
          tar -xzf cuttlefish-webui.tar.gz -C webui-embed

      - name: Build release binary (native)
        if: "!matrix.cross"
        env:
          WEBUI_DIR: ${{ github.workspace }}/webui-embed
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        env:
          WEBUI_DIR: ${{ github.workspace }}/webui-embed
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p package
          cp target/${{ matrix.target }}/release/cuttlefish-rs package/
          cd package
          tar czvf ../cuttlefish-server-${{ matrix.name }}.tar.gz cuttlefish-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.name }}
          path: cuttlefish-server-${{ matrix.name }}.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: [determine-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name 'cuttlefish-server-*.tar.gz' -exec mv {} release/ \;
          ls -la release/

      - name: Generate release notes
        run: |
          VERSION="server-v${{ needs.determine-version.outputs.version }}"
          PREV_TAG=$(git tag -l "server-v*" | sort -V | tail -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -20 --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)" -- src/ crates/ Cargo.toml Cargo.lock)
          fi

          cat > release_notes.md << EOF
          ## Cuttlefish Server $VERSION

          **Commit:** ${{ github.sha }}

          ### Changes
          $COMMITS

          ### Installation
          \`\`\`bash
          sudo bash -c "\$(curl -fsSL https://raw.githubusercontent.com/JackTYM/cuttlefish-rs/master/install.sh)"
          \`\`\`
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-v${{ needs.determine-version.outputs.version }}
          name: Server v${{ needs.determine-version.outputs.version }}
          body_path: release_notes.md
          files: release/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
