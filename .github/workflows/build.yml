name: Build Binaries

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Get base version from Cargo.toml
          base=$(grep '^version = ' Cargo.toml | grep -v workspace | head -1 | sed 's/version = "\(.*\)"/\1/')
          base_major=$(echo $base | cut -d. -f1)
          base_minor=$(echo $base | cut -d. -f2)

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, use base version with -pr suffix
            echo "version=${base}-pr${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "Version for PR: ${base}-pr${{ github.event.number }}"
          else
            # Find highest patch version for this major.minor
            latest_patch=$(git tag -l "v${base_major}.${base_minor}.*" | sed "s/v${base_major}.${base_minor}.//" | sort -n | tail -1)

            if [ -z "$latest_patch" ]; then
              new_patch=1
            else
              new_patch=$((latest_patch + 1))
            fi

            new_version="${base_major}.${base_minor}.${new_patch}"
            echo "version=$new_version" >> $GITHUB_OUTPUT
            echo "Next version: $new_version"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: determine-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Update version in Cargo.toml
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          echo "Setting version to $VERSION"
          # Update root Cargo.toml
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          # Update all crate Cargo.toml files
          for f in crates/*/Cargo.toml; do
            sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" "$f"
          done
          # Show the change
          grep '^version = ' Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install OpenSSL (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../cuttlefish-${{ matrix.name }}.tar.gz cuttlefish-rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuttlefish-${{ matrix.name }}
          path: cuttlefish-${{ matrix.name }}.tar.gz
          retention-days: 7

  create-release:
    name: Create Versioned Release
    needs: [determine-version, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          ls -la release/

      - name: Generate release notes
        run: |
          VERSION="v${{ needs.determine-version.outputs.version }}"

          # Get the previous version tag
          PREV_TAG=$(git tag -l "v0.*" | sort -V | tail -2 | head -1)

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get last 20 commits
            COMMITS=$(git log --oneline -20 --pretty=format:"- %s (%h)")
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)")
          fi

          # Create release notes file
          cat > release_notes.md << EOF
          ## Cuttlefish $VERSION

          **Commit:** ${{ github.sha }}
          **Built:** ${{ github.event.head_commit.timestamp }}

          ### Changes since ${PREV_TAG:-initial commit}
          $COMMITS

          ### Installation
          \`\`\`bash
          sudo bash -c "\$(curl -fsSL https://raw.githubusercontent.com/JackTYM/cuttlefish-rs/master/install.sh)"
          \`\`\`

          Or download the binary for your platform below.
          EOF

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.version }}
          name: v${{ needs.determine-version.outputs.version }}
          body_path: release_notes.md
          files: release/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-latest:
    name: Update Latest Release
    needs: [determine-version, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          ls -la release/

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (v${{ needs.determine-version.outputs.version }})
          body: |
            Automated build from master branch.

            **Version:** v${{ needs.determine-version.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            This release is automatically updated on every push to master.
            For stable releases, use tagged versions (v0.x.x).
          files: release/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
