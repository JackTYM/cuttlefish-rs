# Cuttlefish Configuration Example
# Copy to cuttlefish.toml and edit as needed.
# NEVER commit cuttlefish.toml — it may contain sensitive paths.

# Secrets MUST be provided via environment variables:
#   CUTTLEFISH_API_KEY   — API key for WebUI/TUI access
#   DISCORD_BOT_TOKEN    — Discord bot token (if using Discord)
#   AWS_ACCESS_KEY_ID    — AWS credentials (if using Bedrock)
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION

[server]
host = "127.0.0.1"
port = 8080

[database]
path = "cuttlefish.db"

[sandbox]
docker_socket = "unix:///var/run/docker.sock"
memory_limit_mb = 2048
cpu_limit = 2.0
disk_limit_gb = 10
max_concurrent = 5

[discord]
token_env_var = "DISCORD_BOT_TOKEN"
guild_ids = []

[providers.claude]
provider_type = "bedrock"
model = "anthropic.claude-3-5-sonnet-20241022-v2:0"
region = "us-east-1"

[providers.claude-fast]
provider_type = "bedrock"
model = "anthropic.claude-3-haiku-20240307-v1:0"
region = "us-east-1"

[agents.orchestrator]
category = "deep"

[agents.coder]
category = "deep"

[agents.critic]
category = "unspecified-high"

# Model routing configuration
# Maps task categories and agent roles to specific providers/models
[routing.categories]
deep = { provider = "anthropic", model = "claude-sonnet-4-6" }
quick = { provider = "anthropic", model = "claude-haiku-4-5" }
ultrabrain = { provider = "anthropic", model = "claude-opus-4-6" }
visual = { provider = "google", model = "gemini-2.0-flash" }
unspecified-high = { provider = "anthropic", model = "claude-sonnet-4-6" }
unspecified-low = { provider = "anthropic", model = "claude-haiku-4-5" }

# Agent-specific overrides (optional, takes precedence over category)
# [routing.agents]
# coder = { provider = "anthropic", model = "claude-opus-4-6" }

# =============================================================================
# Additional Model Providers
# =============================================================================

[providers.anthropic]
provider_type = "anthropic"
model = "claude-sonnet-4-6"
# Requires: ANTHROPIC_API_KEY env var

[providers.openai]
provider_type = "openai"
model = "gpt-5.4"
# Requires: OPENAI_API_KEY env var

[providers.google]
provider_type = "google"
model = "gemini-2.0-flash"
# Requires: GOOGLE_API_KEY env var

[providers.moonshot]
provider_type = "moonshot"
model = "kimi-k2.5"
# Requires: MOONSHOT_API_KEY env var

[providers.zhipu]
provider_type = "zhipu"
model = "glm-4-flash"
# Requires: ZHIPU_API_KEY env var

[providers.minimax]
provider_type = "minimax"
model = "abab6.5s-chat"
# Requires: MINIMAX_API_KEY and MINIMAX_GROUP_ID env vars

[providers.xai]
provider_type = "xai"
model = "grok-2"
# Requires: XAI_API_KEY env var

[providers.ollama]
provider_type = "ollama"
model = "llama3.1"
# No auth required - uses local Ollama at http://localhost:11434
