# Cuttlefish Full Stack Docker Compose
#
# This deploys the complete Cuttlefish stack:
# - API server (Rust backend)
# - Web Dashboard (Nuxt SSR frontend)
# - Marketing Site (Nuxt SSG static site)
# - Tunnel daemon (for self-hosted access)
#
# Usage:
#   docker compose up -d
#
# For development, use the override file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Main API server
  api:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: cuttlefish-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - CUTTLEFISH_API_KEY=${CUTTLEFISH_API_KEY:?API key required}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DATABASE_URL=sqlite:///data/cuttlefish.db
    volumes:
      - cuttlefish-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cuttlefish-net

  # Web Dashboard (Nuxt SSR)
  web:
    build:
      context: ../cuttlefish-web
      dockerfile: ../deploy/Dockerfile.dashboard
    container_name: cuttlefish-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://api:8080
      - NUXT_PUBLIC_WS_URL=ws://api:8080/ws
      - NUXT_PUBLIC_SITE_URL=http://localhost:3000
      - NUXT_API_BASE=http://api:8080
      - NUXT_WS_URL=ws://api:8080/ws
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cuttlefish-net

  # Marketing Site (Nuxt SSG)
  site:
    build:
      context: ../cuttlefish-site
      dockerfile: ../deploy/Dockerfile.site
    container_name: cuttlefish-site
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://api:8080
      - NUXT_PUBLIC_SITE_URL=http://localhost:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cuttlefish-net

  # Tunnel daemon (for self-hosted access)
  tunnel:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.tunnel
    container_name: cuttlefish-tunnel
    restart: unless-stopped
    ports:
      - "8081:8081"  # HTTP proxy
      - "8082:8082"  # WebSocket endpoint
    environment:
      - RUST_LOG=info
      - TUNNEL_SECRET_KEY=${TUNNEL_SECRET_KEY}
    volumes:
      - cuttlefish-tunnel-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cuttlefish-net

volumes:
  cuttlefish-data:
    name: cuttlefish-data
  cuttlefish-tunnel-data:
    name: cuttlefish-tunnel-data

networks:
  cuttlefish-net:
    name: cuttlefish-net
    driver: bridge
